<h2>Job Status</h2>

{% if error %}
<p style="color:red;">Error: {{ error }}</p>
{% else %}
<p>Progress: {{ progress }}%</p>
<progress value="{{ progress }}" max="100"></progress>
{% if progress < 100 %} <p>Refresh this page to update progress...</p>
  {% endif %}
  {% if progress == 100 %}
  <p><a href="{{ url_for('download', filename=output) }}">Download Video</a></p>
  {% endif %}
  {% endif %}
