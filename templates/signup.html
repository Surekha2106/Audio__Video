{% extends "base.html" %}

{% block title %}Smart AI | Join the Platform{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="glass-card" style="max-width: 450px; width: 100%;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="font-size: 2rem;">Create Your Account</h2>
            <p style="color: var(--text-muted);">Start translating your videos today</p>
        </div>

        <form method="POST" action="{{ url_for('signup') }}" style="display: flex; flex-direction: column; gap: 1.25rem;">
            <div class="input-group">
                <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.4rem;">Username</label>
                <input type="text" name="username" placeholder="Choose a unique username" required
                       style="width: 100%; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; padding: 0.8rem 1rem; border-radius: 0.75rem; font-family: inherit; font-size: 1rem; outline: none; transition: var(--transition-smooth);">
            </div>

            <div class="input-group">
                <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.4rem;">Email Address</label>
                <input type="email" name="email" placeholder="example@gmail.com" required
                       style="width: 100%; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; padding: 0.8rem 1rem; border-radius: 0.75rem; font-family: inherit; font-size: 1rem; outline: none; transition: var(--transition-smooth);">
            </div>

            <div class="input-group">
                <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.4rem;">Password</label>
                <input type="password" name="password" placeholder="Create a strong password" required
                       style="width: 100%; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; padding: 0.8rem 1rem; border-radius: 0.75rem; font-family: inherit; font-size: 1rem; outline: none; transition: var(--transition-smooth);">
            </div>

            <div class="input-group">
                <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.4rem;">Confirm Password</label>
                <input type="password" name="confirm" placeholder="Repeat your password" required
                       style="width: 100%; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; padding: 0.8rem 1rem; border-radius: 0.75rem; font-family: inherit; font-size: 1rem; outline: none; transition: var(--transition-smooth);">
            </div>

            <button type="submit" class="btn-primary" style="padding: 1rem; font-size: 1.1rem; width: 100%; margin-top: 0.5rem; text-align:center;">
                Create Account
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
            Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Log In</a>
        </div>
    </div>
</div>

<style>
    input:focus {
        border-color: var(--primary) !important;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
</style>
{% endblock %}
